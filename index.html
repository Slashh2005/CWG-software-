<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview unavailable</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#FAFAF8;color:#161616;
    font-family:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    max-width:440px;width:100%;text-align:center;
    background:#fff;border:1px solid #E1E1DC;border-radius:16px;
    box-shadow:0 6px 20px rgba(20,20,16,.05);
    padding:48px 32px;border-top:3px solid #B97F0E;
  }
  .mark{
    width:44px;height:44px;border-radius:10px;background:#000;
    display:inline-flex;align-items:center;justify-content:center;margin-bottom:22px;
  }
  h1{font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:10px}
  p{font-size:14.5px;line-height:1.6;color:#54544F}
  .tag{
    display:inline-block;margin-top:26px;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#8A8A82;
    border:1px solid #E1E1DC;border-radius:99px;padding:5px 14px;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 22 22" fill="none">
        <path d="M2 15 L9 15 L13 7 L20 7" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="2.5" cy="15" r="2.4" fill="#B97F0E"/>
        <circle cx="19.5" cy="7" r="2.4" fill="#FFFFFF"/>
      </svg>
    </div>
    <h1>This preview is temporarily unavailable</h1>
    <p>The load booking platform preview has been taken offline for the moment. Please contact CWG Holdings if you need access.</p>
    <span class="tag">back soon</span>
  </main>
</body>
</html>
